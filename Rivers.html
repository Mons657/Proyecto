        <style>
            .button {
                border: 0;
                background-image: linear-gradient(150deg, #9500ff, rgb(3, 20, 31), #ff0000);
                border-radius: 8px;
                color: azure;
                display: inline-flex; /* El botón solo mide lo que mide su contenido */
                font-size: 18px;
                padding: 4px;
                cursor: pointer;
                transition: .3s;
                position: relative; /* Le da superpoderes de posicionamiento */
                z-index: 10;
            }
            .button span{
                background-color: black;
                padding: 16px 24px;
                border-radius: 6px;
                transition: .3s;
            }
            .button:hover span{
                background: transparent;
            }
            .button:active{
                transform: scale(0.9);
            }
            nav{
                text-align: right;
                padding: 30px 50px 0 0;
            }
            nav > a{
                color: #ffffff;
                font-weight: 300;
                text-decoration: none;
                margin-right: 10px;
            }
            nav > a:hover{
                color:rgb(167, 9, 240);
                text-decoration: underline;
            }
        </style>
